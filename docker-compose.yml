version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: vendorvault-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-vendorvault_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USERNAME:-vendorvault_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mailtrap-mock:
    image: reachfive/fake-smtp-server
    container_name: vendorvault-mailtrap
    ports:
      - "1080:1080"
      - "${MAIL_PORT:-1025}:1025"

volumes:
  mysql-data:
