# Server
server.port=8080
server.servlet.session.timeout=1800
spring.application.name=vendorvault-clm

# Active Profile
spring.profiles.active=dev

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# File Storage Path (configurable)
app.file.storage.path=./uploads

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Security
app.security.remember-me.key=${VENDORVAULT_REMEMBER_ME_KEY:VendorVaultRememberMeKeyChangeMe}

# Logging
logging.level.com.orion.vendorvault=INFO
logging.level.org.springframework.security=INFO

