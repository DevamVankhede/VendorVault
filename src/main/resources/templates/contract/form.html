<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Draft Contract</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-file-contract" style="color: var(--primary);"></i> Initiate Contract</h1>
                <p class="page-subtitle">Link vendors to agreements based on required workflows.</p>
            </div>
            <a th:href="@{/contracts}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Cancel Drafting</a>
        </div>

        <div class="glass-panel" style="max-width: 800px; padding: 2.5rem;">
            <form th:action="@{/contracts/create}" th:object="${contractDTO}" method="post">
                <div th:if="${#fields.hasErrors('*')}" class="form-group" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #F87171; padding: 1rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem;">
                    <i class="fas fa-exclamation-triangle" style="margin-right: 0.5rem;"></i> <strong>Please correct the following errors:</strong>
                    <ul style="margin: 0.5rem 0 0 1.5rem; padding: 0;">
                        <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                    </ul>
                </div>

                <div th:if="${errorMessage}" class="form-group" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #F87171; padding: 1rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem;">
                    <i class="fas fa-exclamation-circle" style="margin-right: 0.5rem;"></i> <span th:text="${errorMessage}"></span>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                    
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label" for="vendorId">Target Vendor ID <span style="color:red;">*</span></label>
                        <input type="number" id="vendorId" th:field="*{vendorId}" class="form-control" th:classappend="${#fields.hasErrors('vendorId')} ? 'is-invalid' : ''" placeholder="Input the DB ID of the vendor (e.g., 1, 2, 3...)" required>
                        <small style="color: var(--text-muted); font-size: 0.85rem;">Tip: Go to Vendors page to find vendor IDs</small>
                        <div th:if="${#fields.hasErrors('vendorId')}" th:errors="*{vendorId}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label" for="title">Agreement Title <span style="color:red;">*</span></label>
                        <input type="text" id="title" th:field="*{title}" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''" placeholder="E.g., Software Licensing Fall 2024" required>
                        <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="contractType">Contract Type <span style="color:red;">*</span></label>
                        <select id="contractType" th:field="*{contractType}" class="form-control" th:classappend="${#fields.hasErrors('contractType')} ? 'is-invalid' : ''" required>
                            <option value="">-- Select Type --</option>
                            <option value="SERVICE">Service Agreement</option>
                            <option value="PURCHASE">Purchase Order</option>
                            <option value="LEASE">Lease Agreement</option>
                            <option value="MAINTENANCE">Maintenance Contract</option>
                            <option value="CONSULTING">Consulting Agreement</option>
                            <option value="SUBSCRIPTION">Subscription</option>
                        </select>
                        <div th:if="${#fields.hasErrors('contractType')}" th:errors="*{contractType}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="department">Department</label>
                        <input type="text" id="department" th:field="*{department}" class="form-control" placeholder="E.g., IT, Finance, Operations">
                        <div th:if="${#fields.hasErrors('department')}" th:errors="*{department}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="contractValue">Contract Value (INR) <span style="color:red;">*</span></label>
                        <input type="number" step="0.01" id="contractValue" th:field="*{contractValue}" class="form-control" th:classappend="${#fields.hasErrors('contractValue')} ? 'is-invalid' : ''" placeholder="Total negotiated value" required>
                        <div th:if="${#fields.hasErrors('contractValue')}" th:errors="*{contractValue}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="currency">Currency Code</label>
                        <input type="text" id="currency" th:field="*{currency}" value="INR" class="form-control" placeholder="INR">
                        <div th:if="${#fields.hasErrors('currency')}" th:errors="*{currency}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="startDate">Start Date <span style="color:red;">*</span></label>
                        <input type="date" id="startDate" th:field="*{startDate}" class="form-control" th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid' : ''" required>
                        <div th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="endDate">End Date <span style="color:red;">*</span></label>
                        <input type="date" id="endDate" th:field="*{endDate}" class="form-control" th:classappend="${#fields.hasErrors('endDate')} ? 'is-invalid' : ''" required>
                        <div th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>
                    
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label" for="paymentTerms">Payment Terms</label>
                        <textarea id="paymentTerms" th:field="*{paymentTerms}" class="form-control" rows="3" placeholder="E.g., NET 30 days upon invoice receipt"></textarea>
                        <div th:if="${#fields.hasErrors('paymentTerms')}" th:errors="*{paymentTerms}" style="color: #F87171; font-size: 0.875rem; margin-top: 0.25rem;"></div>
                    </div>

                </div>

                <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-file-signature"></i> Create Draft</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
