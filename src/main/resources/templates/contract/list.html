<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Contract Registry</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Contract Registry</h1>
                <p class="page-subtitle">Central repository for all executed and draft agreements.</p>
            </div>
            <a th:href="@{/contracts/create}" class="btn btn-primary"><i class="fas fa-file-contract"></i> Draft Contract</a>
        </div>

        <div class="glass-panel" style="padding: 1.5rem; margin-bottom: 1.5rem;">
            <form th:action="@{/contracts}" method="get" style="display: flex; gap: 1rem; align-items: flex-end;">
                <div style="flex-grow: 1;">
                    <label class="form-label">Search</label>
                    <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Contract title, number or vendor...">
                </div>
                <!-- Status Filter -->
                <div style="width: 250px;">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-control">
                        <option value="">All Statuses</option>
                        <option value="DRAFT" th:selected="${status == 'DRAFT'}">Draft</option>
                        <option value="PENDING_APPROVAL" th:selected="${status == 'PENDING_APPROVAL'}">Pending Approval</option>
                        <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Active</option>
                        <option value="EXPIRING_SOON" th:selected="${status == 'EXPIRING_SOON'}">Expiring Soon</option>
                        <option value="EXPIRED" th:selected="${status == 'EXPIRED'}">Expired</option>
                        <option value="REJECTED" th:selected="${status == 'REJECTED'}">Rejected</option>
                    </select>
                </div>
                <div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-filter"></i> Apply</button>
                    <a th:href="@{/contracts}" class="btn btn-secondary">Clear</a>
                </div>
            </form>
        </div>

        <div class="glass-panel">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Number</th>
                            <th>Title & Vendor</th>
                            <th>Value</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${contractPage.empty}">
                            <td colspan="7" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                                <i class="fas fa-folder-open" style="font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.5;"></i>
                                No contracts found.
                            </td>
                        </tr>
                        <tr th:each="contract : ${contractPage.content}">
                            <td style="font-family: monospace; font-weight: bold; color: var(--info);" th:text="${contract.contractNumber}">CNT-001</td>
                            <td>
                                <div style="font-weight: 600; color: white;" th:text="${contract.title}">Service Agreement</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">
                                    <i class="fas fa-building" style="margin-right: 2px;"></i> <span th:text="${contract.vendor.name}">Acme</span>
                                </div>
                            </td>
                            <td>
                                INR <span th:text="${#numbers.formatDecimal(contract.contractValue, 0, 'COMMA', 2, 'POINT')}">10,000</span>
                            </td>
                            <td th:text="${#temporals.format(contract.startDate, 'dd MMM yyyy')}">01 Jan 2024</td>
                            <td>
                                <div th:text="${#temporals.format(contract.endDate, 'dd MMM yyyy')}">31 Dec 2024</div>
                            </td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${contract.status.name() == 'ACTIVE'} ? 'badge-success' : 
                                                    (${contract.status.name() == 'DRAFT' or contract.status.name() == 'PENDING_APPROVAL'} ? 'badge-info' : 
                                                    (${contract.status.name() == 'EXPIRING_SOON'} ? 'badge-warning' : 'badge-danger'))"
                                      th:text="${contract.status}">Status</span>
                            </td>
                            <td>
                                <a th:href="@{/contracts/{id}(id=${contract.id})}" class="btn btn-secondary" style="padding: 0.4rem; border-radius: 5px;">
                                    <i class="fas fa-eye" style="margin:0;"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
             <!-- Pagination Controls -->
            <div th:if="${contractPage.totalPages > 1}" style="padding: 1rem; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end;">
                <div style="display: flex; gap: 0.25rem;">
                    <a th:each="i : ${pageNumbers}" th:href="@{/contracts(page=${i}, status=${status})}" 
                       class="btn" th:classappend="${contractPage.number + 1 == i} ? 'btn-primary' : 'btn-secondary'"
                       style="padding: 0.3rem 0.6rem; min-width: 30px; text-align: center;" th:text="${i}"></a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
