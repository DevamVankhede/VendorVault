<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Inter', Helvetica, sans-serif; background-color: #f8fafc; color: #334155; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .header { background: #10b981; color: white; padding: 24px; text-align: center; } /* Success color */
        .content { padding: 32px 24px; line-height: 1.6; }
        .btn { display: inline-block; background: #4f46e5; color: white; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; margin-top: 20px; text-align: center;}
        .footer { background: #f1f5f9; padding: 16px; text-align: center; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Welcome to VendorVault CLM</h2>
        </div>
        <div class="content">
            <h3 th:text="${title}">Account Provisioned</h3>
            <p th:text="${message}">Your user account has been successfully set up.</p>
            <p>You can now log into the enterprise portal using your corporate credentials.</p>
            
            <a th:href="${actionUrl != null ? actionUrl : 'http://localhost:8080/login'}" class="btn">Login to Portal</a>
        </div>
        <div class="footer">
            <p>This is an automated message from VendorVault System. Do not reply.</p>
        </div>
    </div>
</body>
</html>
