<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Reports & Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .report-card {
            padding: 2rem;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .report-card:hover {
            transform: translateY(-5px);
        }
        .chart-placeholder {
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Reports & Analytics</h1>
                <p class="page-subtitle">Visual overview of contract distribution and financial exposure.</p>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <a th:href="@{/reports/export}" class="btn btn-primary"><i class="fas fa-file-pdf"></i> PDF</a>
                <a th:href="@{/reports/export/csv}" class="btn btn-secondary"><i class="fas fa-file-csv"></i> CSV</a>
            </div>
        </div>

        <div class="report-grid">
            <!-- Financial Exposure Card -->
            <div class="glass-panel report-card">
                <h3>Financial Exposure by Dept</h3>
                <div style="height: 250px; margin: 1.5rem 0;">
                    <canvas id="exposureChart"></canvas>
                </div>
                <table class="table" style="font-size: 0.9rem;">
                    <thead>
                        <tr>
                            <th>Department</th>
                            <th style="text-align: right;">Total Exposure</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${exposureData}">
                            <td th:text="${item.department}">IT</td>
                            <td style="text-align: right; font-weight: 600;" th:text="${#numbers.formatDecimal(item.exposure, 0, 'COMMA', 2, 'POINT')}">100.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Performance Card -->
            <div class="glass-panel report-card">
                <h3>Vendor Performance Metrics</h3>
                <div style="height: 300px; margin: 1.5rem 0;">
                    <canvas id="performanceChart"></canvas>
                </div>
                <p class="text-muted" style="font-size: 0.85rem;">Multi-axis comparison of Reliability, Communication, and Compliance scores.</p>
            </div>
        </div>

        <script th:inline="javascript">
            /*<![CDATA[*/
            document.addEventListener('DOMContentLoaded', function() {
                const exposureData = [[${exposureData}]];
                const labels = exposureData.map(item => item.department);
                const dataValues = exposureData.map(item => item.exposure);

                const ctx = document.getElementById('exposureChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dataValues,
                            backgroundColor: [
                                '#6366f1', '#a855f7', '#ec4899', '#f43f5e', '#f59e0b', '#10b981', '#3b82f6'
                            ],
                            borderWidth: 0,
                            hoverOffset: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: 'rgba(255, 255, 255, 0.7)',
                                    font: { size: 10 }
                                }
                            }
                        }
                    }
                });

                // Performance Radar Chart
                const perfDataRaw = [[${performanceData}]];
                const labelsRadar = ['Quality', 'Delivery', 'Communication', 'Compliance'];
                
                const datasetsRadar = perfDataRaw.map((v, i) => ({
                    label: v.vendor,
                    data: [v.quality, v.delivery, v.communication, v.compliance],
                    fill: true,
                    backgroundColor: `rgba(${99 + i*30}, ${102 + i*20}, 241, 0.2)`,
                    borderColor: `rgba(${99 + i*30}, ${102 + i*20}, 241, 1)`,
                    pointBackgroundColor: `rgba(${99 + i*30}, ${102 + i*20}, 241, 1)`,
                }));

                const ctxRadar = document.getElementById('performanceChart').getContext('2d');
                new Chart(ctxRadar, {
                    type: 'radar',
                    data: {
                        labels: labelsRadar,
                        datasets: datasetsRadar
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                angleLines: { color: 'rgba(255,255,255,0.1)' },
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                pointLabels: { color: 'rgba(255,255,255,0.7)', font: { size: 10 } },
                                ticks: { display: false },
                                suggestedMin: 0,
                                suggestedMax: 100
                            }
                        },
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: 'rgba(255,255,255,0.7)', boxWidth: 10, font: { size: 10 } }
                            }
                        }
                    }
                });
            });
            /*]]>*/
        </script>
    </div>
</body>
</html>
