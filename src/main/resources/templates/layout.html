<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VendorVault CLM - Modern Contract Lifecycle Management">
    <title layout:title-pattern="$CONTENT_TITLE | $LAYOUT_TITLE">VendorVault</title>
    
    <!-- Fonts and Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Main Content Wrapper -->
        <main class="app-main">
            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <!-- Global Alerts -->
            <div th:if="${successMessage}" class="glass-panel" style="margin: 1rem 2rem; padding: 1rem; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); color: #34D399; position: sticky; top: 90px; z-index: 30; animation: fadeIn 0.3s ease-out;">
                <i class="fas fa-check-circle" style="margin-right: 0.5rem;"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="glass-panel" style="margin: 1rem 2rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: #F87171; position: sticky; top: 90px; z-index: 30; animation: fadeIn 0.3s ease-out;">
                <i class="fas fa-exclamation-circle" style="margin-right: 0.5rem;"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <!-- Dynamic Content -->
            <div class="app-content fade-in" layout:fragment="content">
                <!-- Page Content Injected Here -->
            </div>
        </main>
    </div>

</body>
</html>
