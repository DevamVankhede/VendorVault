<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Notifications</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-bell" style="color: var(--primary);"></i> Notifications</h1>
                <p class="page-subtitle">Your activity timeline and system alerts.</p>
            </div>
            <form th:action="@{/notifications/read-all}" method="post">
                <button type="submit" class="btn btn-secondary"><i class="fas fa-check-double"></i> Mark All as Read</button>
            </form>
        </div>

        <div class="glass-panel" style="max-width: 800px;">
            <div th:if="${#lists.isEmpty(notifications)}" style="padding: 4rem; text-align: center; color: var(--text-muted);">
                <i class="far fa-bell" style="font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.3;"></i>
                <h3>No new notifications</h3>
                <p>You're all caught up on system activities.</p>
            </div>

            <div th:each="notification : ${notifications}" style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; gap: 1.5rem; align-items: flex-start; transition: var(--transition);" th:styleappend="${!notification.read ? 'background: rgba(79, 70, 229, 0.05);' : ''}">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--info);">
                    <i class="fas" th:classappend="${notification.type.name() == 'WORKFLOW' ? 'fa-project-diagram' : (notification.type.name() == 'EXPIRY_ALERT' ? 'fa-exclamation-triangle text-danger' : 'fa-info-circle')}"></i>
                </div>
                <div style="flex-grow: 1;">
                    <div style="font-weight: 500; font-size: 1.05rem; margin-bottom: 0.25rem;" th:text="${notification.title}">Notification Title</div>
                    <div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;" th:text="${notification.message}">Details about the notification go here.</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);"><i class="far fa-clock"></i> <span th:text="${#temporals.format(notification.createdAt, 'dd MMM yyyy, HH:mm')}">Time</span></div>
                </div>
                <div th:if="${!notification.read}">
                    <form th:action="@{/notifications/{id}/read(id=${notification.id})}" method="post">
                        <button type="submit" class="btn" style="background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 0.4rem 0.75rem; font-size: 0.75rem;"><i class="fas fa-check" style="margin-right: 0;"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
