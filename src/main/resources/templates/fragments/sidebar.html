<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body th:fragment="sidebar">
    <aside class="app-sidebar glass-panel" style="border-radius: 0; box-shadow: 5px 0 20px rgba(0,0,0,0.2);">
        <div class="sidebar-logo">
            <i class="fas fa-shield-alt"></i> VendorVault
        </div>
        
        <nav class="sidebar-nav">
            <a th:href="@{/dashboard}" class="nav-item" th:classappend="${currentUri == '/dashboard' ? 'active' : ''}">
                <i class="fas fa-chart-pie"></i> Dashboard
            </a>
            
            <div style="margin: 1.5rem 0 0.5rem 1rem; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em;">Core</div>
            
            <a th:href="@{/vendors}" class="nav-item" th:classappend="${currentUri.startsWith('/vendors') ? 'active' : ''}">
                <i class="fas fa-building"></i> Vendors
            </a>
            
            <a th:href="@{/contracts}" class="nav-item" th:classappend="${currentUri.startsWith('/contracts') ? 'active' : ''}">
                <i class="fas fa-file-signature"></i> Contracts
            </a>
            
            <a th:href="@{/approvals/pending}" class="nav-item" th:classappend="${currentUri.startsWith('/approvals') ? 'active' : ''}">
                <i class="fas fa-inbox"></i> Approvals 
                <span class="badge badge-warning" style="margin-left: auto; font-size: 0.65rem;" th:if="${pendingCount > 0}" th:text="${pendingCount}">0</span>
            </a>
            
            <div sec:authorize="hasRole('SYSTEM_ADMIN')" style="margin: 1.5rem 0 0.5rem 1rem; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em;">System</div>
            
            <a sec:authorize="hasRole('SYSTEM_ADMIN')" th:href="@{/users}" class="nav-item" th:classappend="${currentUri.startsWith('/users') ? 'active' : ''}">
                <i class="fas fa-users-cog"></i> User Management
            </a>
            <a th:href="@{/notifications}" class="nav-item" th:classappend="${currentUri.startsWith('/notifications') ? 'active' : ''}">
                <i class="fas fa-bell"></i> Notifications
            </a>
            <a sec:authorize="hasRole('SYSTEM_ADMIN')" th:href="@{/reports}" class="nav-item" th:classappend="${currentUri.startsWith('/reports') ? 'active' : ''}">
                <i class="fas fa-file-excel"></i> Reports
            </a>
        </nav>
        
        <div style="margin-top: auto; padding: 1.5rem; border-top: 1px solid var(--border-color);">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--info)); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;">
                    <span th:text="${#authentication.name != null ? #strings.substring(#authentication.name,0,1).toUpperCase() : 'U'}">U</span>
                </div>
                <div style="overflow: hidden;">
                    <div style="font-weight: 500; color: white; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;" th:text="${#authentication.name}">Username</div>
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; padding: 0; text-decoration: underline;">Sign Out</button>
                    </form>
                </div>
            </div>
        </div>
    </aside>
</body>
</html>
