<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VendorVault CLM - Modern Contract Lifecycle Management">
    <title th:text="${title} + ' | VendorVault CLM'">VendorVault</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Main Content Wrapper -->
        <main class="app-main">
            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <!-- Alerts / Toast Messages -->
            <div th:if="${successMessage}" class="glass-panel" style="margin: 1rem 2rem; padding: 1rem; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); color: #34D399; position: sticky; top: 90px; z-index: 30; animation: fadeIn 0.3s ease-out;">
                <i class="fas fa-check-circle" style="margin-right: 0.5rem;"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="glass-panel" style="margin: 1rem 2rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: #F87171; position: sticky; top: 90px; z-index: 30; animation: fadeIn 0.3s ease-out;">
                <i class="fas fa-exclamation-circle" style="margin-right: 0.5rem;"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <!-- Dynamic Content -->
            <div class="app-content fade-in" th:replace="~{::content}">
                <!-- Page Content Injected Here -->
            </div>
        </main>
    </div>

    <!-- Core Scripts -->
    <script th:src="@{/js/app.js}"></script>
    <th:block th:replace="~{::scripts} ? ~{::scripts} : ~{}"></th:block>
</body>
</html>
