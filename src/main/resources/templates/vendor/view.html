<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Vendor Details</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-building" style="color: var(--info);"></i> <span th:text="${vendor.name}">Vendor Name</span></h1>
                <p class="page-subtitle" th:text="${'Registered Vendor Code: ' + vendor.vendorCode}">Code</p>
            </div>
            <a th:href="@{/vendors}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Directory</a>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
            
            <div class="glass-panel" style="padding: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    <h3>Profile Information</h3>
                    <span class="badge" th:classappend="${vendor.status.name() == 'ACTIVE'} ? 'badge-success' : 'badge-warning'" th:text="${vendor.status}">Status</span>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div>
                        <div style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Entity Type</div>
                        <div style="font-weight: 500; font-size: 1.1rem;" th:text="${vendor.vendorType}">Type</div>
                    </div>
                    <div>
                        <div style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Business Category</div>
                        <div style="font-weight: 500; font-size: 1.1rem;" th:text="${vendor.category}">Category</div>
                    </div>
                    <div style="grid-column: span 2;">
                        <div style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Registered Address</div>
                        <div style="font-weight: 500; line-height: 1.5;" th:text="${vendor.address != null ? vendor.address : 'Not Provided'}">Address</div>
                    </div>
                </div>

                <h3 style="margin-top: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">Compliance Details</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div>
                        <div style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">PAN / Tax ID</div>
                        <div style="font-weight: 500; font-family: monospace; font-size: 1.1rem; color: var(--info);" th:text="${vendor.pan}">PAN</div>
                    </div>
                    <div>
                        <div style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">GSTIN / VAT</div>
                        <div style="font-weight: 500; font-family: monospace; font-size: 1.1rem;" th:text="${vendor.gstin != null ? vendor.gstin : 'N/A'}">GSTIN</div>
                    </div>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="glass-panel" style="padding: 2rem;">
                    <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">Point of Contact</h3>
                    <div style="margin-bottom: 1rem;">
                        <i class="fas fa-user-circle" style="color: var(--text-muted); margin-right: 0.5rem;"></i>
                        <span style="font-weight: 600;" th:text="${vendor.contactName}">Name</span>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <i class="fas fa-envelope" style="color: var(--text-muted); margin-right: 0.5rem;"></i>
                        <a th:href="'mailto:' + ${vendor.contactEmail}" style="color: var(--info); text-decoration: none;" th:text="${vendor.contactEmail}">email</a>
                    </div>
                    <div>
                        <i class="fas fa-phone-alt" style="color: var(--text-muted); margin-right: 0.5rem;"></i>
                        <span th:text="${vendor.contactPhone != null ? vendor.contactPhone : 'N/A'}">Phone</span>
                    </div>
                </div>

                <div class="glass-panel" style="padding: 2rem; flex-grow: 1;">
                    <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">Document Vault</h3>
                    
                    <ul style="list-style: none; padding: 0; margin-bottom: 1.5rem;" th:if="${not #lists.isEmpty(vendor.documents)}">
                        <li th:each="doc : ${vendor.documents}" style="display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px dashed rgba(255,255,255,0.1);">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <i class="fas fa-file-pdf" style="color: var(--danger); font-size: 1.5rem;"></i>
                                <div>
                                    <div style="font-weight: 500; font-size: 0.9rem;" th:text="${doc.originalFileName}">Doc.pdf</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="${doc.documentType}">Type</div>
                                </div>
                            </div>
                            <span class="badge" th:classappend="${doc.verified} ? 'badge-success' : 'badge-warning'" th:text="${doc.verified ? 'Verified' : 'Pending'}"></span>
                        </li>
                    </ul>

                    <div th:if="${#lists.isEmpty(vendor.documents)}" style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">
                        <i class="fas fa-folder-open" style="font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5;"></i>
                        <p style="font-size: 0.9rem;">No documents uploaded yet.</p>
                    </div>

                    <form th:action="@{/vendors/{id}/upload(id=${vendor.id})}" method="post" enctype="multipart/form-data" style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <select name="documentType" class="form-control" style="font-size: 0.85rem; padding: 0.5rem;" required>
                                <option value="">Select Document Type</option>
                                <option value="TAX_CERTIFICATE">Tax Certificate / PAN</option>
                                <option value="INCORPORATION">Incorporation Certificate</option>
                                <option value="NDA">NDA Agreement</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="file" name="file" class="form-control" style="font-size: 0.85rem; padding: 0.4rem;" required accept=".pdf,.png,.jpg">
                            <button type="submit" class="btn btn-primary" style="padding: 0.4rem 0.8rem;"><i class="fas fa-upload" style="margin:0;"></i></button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
