<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Users</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">User Management</h1>
                <p class="page-subtitle">Configure system operators and permissions.</p>
            </div>
            <a th:href="@{/users/create}" class="btn btn-primary"><i class="fas fa-user-plus"></i> Add User</a>
        </div>

        <div class="glass-panel">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${userPage.content}">
                            <td style="font-family: monospace;" th:text="${user.employeeId}">EMP001</td>
                            <td style="font-weight: 500; color: white;" th:text="${user.fullName}">John Doe</td>
                            <td th:text="${user.email}">john@orion.com</td>
                            <td>
                                <span th:each="role : ${user.roles}" 
                                      class="badge" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); margin-right: 0.25rem; font-size: 0.7rem;"
                                      th:text="${role.roleName}">ROLE</span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${user.active} ? 'badge-success' : 'badge-danger'" th:text="${user.active ? 'ACTIVE' : 'DISABLED'}">ACTIVE</span>
                            </td>
                            <td>
                                <form th:action="@{/users/{id}/toggle(id=${user.id})}" method="post">
                                    <button type="submit" class="btn btn-secondary" style="padding: 0.2rem 0.5rem; font-size: 0.75rem;">
                                        <i class="fas" th:classappend="${user.active} ? 'fa-ban' : 'fa-check'"></i> Toggle
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
             <!-- Pagination -->
            <div th:if="${userPage.totalPages > 1}" style="padding: 1rem; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end;">
                <div style="display: flex; gap: 0.25rem;">
                    <a th:each="i : ${pageNumbers}" th:href="@{/users(page=${i})}" 
                       class="btn" th:classappend="${userPage.number + 1 == i} ? 'btn-primary' : 'btn-secondary'"
                       style="padding: 0.3rem 0.6rem; min-width: 30px; text-align: center;" th:text="${i}"></a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
