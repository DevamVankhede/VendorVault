<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Provision User</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fas fa-user-plus" style="color: var(--primary);"></i> Provision User Account</h1>
                <p class="page-subtitle">Configure system access and RBAC responsibilities.</p>
            </div>
            <a th:href="@{/users}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Cancel</a>
        </div>

        <div class="glass-panel" style="max-width: 600px; padding: 2.5rem;">
            <form th:action="@{/users/create}" th:object="${userDTO}" method="post">
                <div th:if="${#fields.hasErrors('*')}" class="form-group" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #F87171; padding: 1rem; border-radius: var(--radius-sm);">
                    <i class="fas fa-exclamation-triangle" style="margin-right: 0.5rem;"></i> Please correct the highlighted errors.
                </div>

                <div style="display: grid; gap: 1.5rem; margin-bottom: 2rem;">

                    <div class="form-group">
                        <label class="form-label" for="employeeId">Employee ID <span style="color:red;">*</span></label>
                        <input type="text" id="employeeId" th:field="*{employeeId}" class="form-control" placeholder="EMP001" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="fullName">Full Name <span style="color:red;">*</span></label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Corporate Email <span style="color:red;">*</span></label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="name@orion.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Initial Password <span style="color:red;">*</span></label>
                        <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Provision Account</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
