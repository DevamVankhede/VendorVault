<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Internal Server Error</title>
</head>
<body>
    <div layout:fragment="content">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height: 60vh; text-align:center;">
            <i class="fas fa-bomb" style="font-size: 5rem; color: #fff; margin-bottom: 2rem; opacity: 0.8; text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);"></i>
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">500 Internal Defect</h1>
            <p style="color: var(--text-muted); font-size: 1.25rem; max-width: 600px; margin-bottom: 2rem;">
                A critical logic cascade has prevented VendorVault from fulfilling this request. The system trace has been automatically dispatched to Site Reliability.
            </p>
            <a th:href="@{/dashboard}" class="btn btn-primary"><i class="fas fa-satellite-dish"></i> Signal Dashboard</a>
        </div>
    </div>
</body>
</html>
