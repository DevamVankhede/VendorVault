<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Global Error</title>
</head>
<body>
    <div layout:fragment="content">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height: 60vh; text-align:center;">
            <i class="fas fa-exclamation-triangle" style="font-size: 5rem; color: var(--danger); margin-bottom: 2rem; opacity: 0.8; text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);"></i>
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">400 Bad Request</h1>
            <p style="color: var(--text-muted); font-size: 1.25rem; max-width: 600px; margin-bottom: 2rem;">
                The server could not understand the request due to invalid syntax or parameters.
            </p>
            <div class="glass-panel" style="padding: 1rem 2rem; background: rgba(0,0,0,0.3); border-color: var(--danger); font-family: monospace; color: #FCA5A5; margin-bottom: 2rem;">
                <span th:text="${errorMessage}">Error details</span>
            </div>
            <button onclick="history.back()" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Return to Safety</button>
        </div>
    </div>
</body>
</html>
