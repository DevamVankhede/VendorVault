spring:
  flyway:
    enabled: false
  application:
    name: vendorvault-clm

  datasource:
    url: jdbc:h2:mem:vendorvault_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # MVC / Thymeleaf
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  thymeleaf:
    cache: false
    mode: HTML

  # Mail Server Setup (Mock for Testing)
  mail:
    host: localhost
    port: 2525
    username: test
    password: password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080

logging:
  level:
    com.orion.vendorvault: DEBUG
    org.springframework.security: INFO
